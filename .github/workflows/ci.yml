name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build (${{ matrix.os }} / ${{ matrix.compiler }} / ${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]
        compiler: [gcc, clang]
        build_type: [Debug, Release]
        include:
          - os: ubuntu-22.04
            compiler: gcc
            cc: gcc
            cxx: g++
          - os: ubuntu-22.04
            compiler: clang
            cc: clang
            cxx: clang++

    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
      CMAKE_BUILD_PARALLEL_LEVEL: 4

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            gcc g++ clang \
            python3 python3-pip \
            pkg-config

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: |
            build
          key: ${{ runner.os }}-cmake-${{ matrix.compiler }}-${{ matrix.build_type }}-${{ hashFiles('CMakeLists.txt', '**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-cmake-${{ matrix.compiler }}-${{ matrix.build_type }}-

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DENABLE_TESTING=ON \
            -DENABLE_INTERGRATION=ON \
            -DENABLE_INTEROP=OFF \
            -DENABLE_FUZZING=OFF \
            -DBUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build --parallel 4

      - name: Run unit tests
        run: python3 run_tests.py utest

      - name: Run integration tests
        run: python3 run_tests.py integration
        timeout-minutes: 20

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.compiler }}-${{ matrix.build_type }}
          path: |
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          if-no-files-found: ignore
